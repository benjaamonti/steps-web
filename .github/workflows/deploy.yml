name: Deploy to GitHub Pages

on:
  # Se ejecuta cada vez que haces push a la rama main
  push:
    branches: ["main"]
  workflow_dispatch:

# Permisos necesarios para que GitHub Actions publique en Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# 1. AGREGAR ESTO: Fuerza a las actions a usar Node 24 y silencia la advertencia
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 2. CAMBIAR ESTO: de 20 a 24
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Construir el proyecto
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto (carpeta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' 

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
